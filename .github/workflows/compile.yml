name: Build ESP8266 Bin

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          sudo mv bin/arduino-cli /usr/local/bin/

      - name: Install ESP8266 Core
        run: |
          arduino-cli core update-index --additional-urls https://arduino.esp8266.com/stable/package_esp8266com_index.json
          arduino-cli core install esp8266:esp8266 --additional-urls https://arduino.esp8266.com/stable/package_esp8266com_index.json

      - name: Install Libraries
        run: |
          arduino-cli lib install "ESPAsyncTCP"
          arduino-cli lib install "ESP Async WebServer"
          arduino-cli lib install "ArduinoJson"

      - name: Compile Sketch
        run: |
          # ဖိုင်ရှိတဲ့ Folder ထဲကို အရင်ဝင်ပြီးမှ Compile လုပ်ခိုင်းတာပါ
          SKETCH_FULL_PATH=$(find . -name "*.ino" | head -n 1)
          SKETCH_DIR=$(dirname "$SKETCH_FULL_PATH")
          SKETCH_FILE=$(basename "$SKETCH_FULL_PATH")
          
          echo "Found sketch: $SKETCH_FILE in directory: $SKETCH_DIR"
          
          arduino-cli compile --fqbn esp8266:esp8266:nodemcuv2 --output-dir ./build "$SKETCH_DIR/$SKETCH_FILE"

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: esp8266-firmware
          path: ./build/*.bin
          
